<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SocialTrack</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#070b12; --card:#13192a; --border:#1c2438;
  --accent:#3b82f6; --accent2:#8b5cf6;
  --green:#10b981; --red:#ef4444; --yellow:#f59e0b;
  --text:#e2e8f0; --muted:#64748b;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

.topbar{background:#0d1117;border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;justify-content:space-between}
.logo-text{font-size:20px;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.connected{font-size:12px;background:rgba(16,185,129,0.15);color:var(--green);padding:4px 12px;border-radius:20px;border:1px solid rgba(16,185,129,0.3)}

.main{max-width:860px;margin:0 auto;padding:24px 16px}

.search-box{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;margin-bottom:24px}
.search-box h2{font-size:18px;font-weight:800;margin-bottom:4px}
.search-box p{font-size:13px;color:var(--muted);margin-bottom:20px}

.url-input{
  width:100%;padding:14px 16px;
  background:var(--bg);border:2px solid var(--border);
  border-radius:12px;color:var(--text);
  font-size:14px;outline:none;
  direction:ltr;text-align:left;
  margin-bottom:12px;
  font-family:'Tajawal',sans-serif;
  transition:border-color 0.2s;
}
.url-input:focus{border-color:var(--accent)}

.analyze-btn{
  width:100%;padding:14px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border:none;border-radius:12px;
  color:white;font-size:16px;font-weight:800;
  font-family:'Tajawal',sans-serif;
  cursor:pointer;
  transition:opacity 0.2s;
}
.analyze-btn:hover{opacity:0.9}
.analyze-btn:disabled{opacity:0.5;cursor:not-allowed}

.error{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:10px;padding:12px 16px;margin-top:12px;font-size:13px;color:#fca5a5;display:none}
.error.show{display:block}

.loading{text-align:center;padding:40px;display:none}
.loading.show{display:block}
.spinner{width:44px;height:44px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading p{color:var(--muted);font-size:14px}

/* Results */
.profile-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:16px;border-top:3px solid var(--accent)}
.profile-top{display:flex;gap:16px;align-items:center;margin-bottom:16px}
.avatar{width:64px;height:64px;border-radius:50%;object-fit:cover;background:var(--border);flex-shrink:0}
.profile-name{font-size:18px;font-weight:800}
.profile-handle{font-size:13px;color:var(--muted)}
.profile-bio{font-size:13px;opacity:0.8;margin-top:6px;line-height:1.5}

.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.stat{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center}
.stat-num{font-size:20px;font-weight:800;color:var(--accent)}
.stat-lbl{font-size:11px;color:var(--muted);margin-top:4px}

.posts-title{font-size:15px;font-weight:800;margin-bottom:12px}
.posts-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.post{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;cursor:pointer}
.post:hover{border-color:var(--accent)}
.post-img{aspect-ratio:1;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:28px;overflow:hidden}
.post-img img{width:100%;height:100%;object-fit:cover}
.post-info{padding:8px}
.post-caption{font-size:11px;color:var(--muted);overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;margin-bottom:6px}
.post-nums{font-size:11px;display:flex;gap:8px}

.back-btn{width:100%;padding:12px;background:transparent;border:1px solid var(--border);border-radius:12px;color:var(--text);font-size:14px;font-weight:700;font-family:'Tajawal',sans-serif;cursor:pointer;margin-top:8px}
.back-btn:hover{border-color:var(--accent);color:var(--accent)}

@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.fadeUp{animation:fadeUp 0.35s ease}

.section-title{font-size:14px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin:20px 0 10px;padding-right:4px}

.eng-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:4px;display:flex;gap:16px;align-items:center}
.eng-main{text-align:center;min-width:80px}
.eng-num{font-size:32px;font-weight:800;line-height:1}
.eng-label{font-size:12px;font-weight:700;margin-top:4px}
.eng-sub{font-size:10px;color:var(--muted);margin-top:2px}
.eng-details{flex:1;display:flex;flex-direction:column;gap:10px}
.eng-item{display:flex;align-items:center;gap:10px}
.eng-icon{font-size:20px}
.eng-val{font-size:16px;font-weight:800}
.eng-key{font-size:11px;color:var(--muted)}

.highlight-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:4px}
.highlight-post{position:relative}
.post-badge{position:absolute;top:6px;right:6px;z-index:2;background:rgba(0,0,0,0.75);color:white;font-size:10px;font-weight:700;padding:3px 7px;border-radius:20px;backdrop-filter:blur(4px)}

.adv-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:4px}
.adv-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center}
.adv-icon{font-size:22px;margin-bottom:6px}
.adv-val{font-size:20px;font-weight:800;color:var(--accent)}
.adv-lbl{font-size:12px;font-weight:700;margin-top:4px;color:var(--text)}
.adv-sub{font-size:10px;color:var(--muted);margin-top:2px}

.chart-wrap{display:flex;gap:4px;align-items:flex-end;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px 12px 8px;margin-bottom:4px;overflow-x:auto}
.chart-col{display:flex;flex-direction:column;align-items:center;flex:1;min-width:20px}
.chart-bar-wrap{height:80px;display:flex;align-items:flex-end;width:100%}
.chart-bar{width:100%;background:linear-gradient(180deg,var(--accent),rgba(59,130,246,0.3));border-radius:4px 4px 0 0;min-height:3px;transition:opacity 0.2s;cursor:pointer}
.chart-bar:hover{opacity:0.75}
.chart-lbl{font-size:9px;color:var(--muted);margin-top:4px;white-space:nowrap}

.post-reach{padding:4px 8px 6px;font-size:10px;font-weight:700;border-top:1px solid var(--border)}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo-text">📊 SocialTrack</div>
  <div style="display:flex;gap:8px;align-items:center">
    <div class="connected" id="connectedBadge">✅ Apify متصل</div>
    <button onclick="localStorage.removeItem('apify_token');location.reload()" style="background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:20px;padding:4px 10px;font-size:11px;cursor:pointer;font-family:Tajawal,sans-serif">تغيير التوكن</button>
  </div>
</div>

<div class="main">

  <!-- Token Setup -->
  <div id="tokenSetup" style="display:none">
    <div class="search-box">
      <h2>🔑 إعداد Apify Token</h2>
      <p>أدخل توكن Apify للبدء — يُحفظ محلياً على جهازك فقط</p>
      <input type="text" class="url-input" id="tokenInput" placeholder="apify_api_..." style="direction:ltr;margin-bottom:12px">
      <button class="analyze-btn" id="saveTokenBtn">💾 حفظ والمتابعة</button>
      <p style="font-size:11px;color:var(--muted);margin-top:10px;text-align:center">
        احصل على توكنك من: <a href="https://console.apify.com/settings/integrations" target="_blank" style="color:var(--accent)">console.apify.com</a>
      </p>
    </div>
  </div>

  <!-- Search -->
  <div class="search-box" id="searchBox">
    <h2>🔍 راقب منافسيك</h2>
    <p>الصق رابط حساب إنستقرام وسنحلله فوراً</p>

    <input
      type="text"
      class="url-input"
      id="urlInput"
      placeholder="https://www.instagram.com/cristiano/"
    >

    <button class="analyze-btn" id="analyzeBtn">
      🔎 تحليل الحساب
    </button>

    <div class="error" id="errorMsg"></div>
  </div>

  <!-- Loading -->
  <div class="loading" id="loadingBox">
    <div class="spinner"></div>
    <p id="loadingText">جاري تشغيل السكرابر...</p>
  </div>

  <!-- Results -->
  <div id="resultsBox"></div>

</div>

<script>
let TOKEN = localStorage.getItem('apify_token') || '';

// Check token on load
function checkToken() {
  TOKEN = localStorage.getItem('apify_token') || '';
  if (!TOKEN) {
    document.getElementById('tokenSetup').style.display = 'block';
    document.getElementById('searchBox').style.display = 'none';
  } else {
    document.getElementById('tokenSetup').style.display = 'none';
    document.getElementById('searchBox').style.display = 'block';
  }
}

document.getElementById('saveTokenBtn').addEventListener('click', function() {
  const t = document.getElementById('tokenInput').value.trim();
  if (!t.startsWith('apify_api_')) {
    alert('التوكن غير صحيح — يجب أن يبدأ بـ apify_api_');
    return;
  }
  localStorage.setItem('apify_token', t);
  TOKEN = t;
  document.getElementById('tokenSetup').style.display = 'none';
  document.getElementById('searchBox').style.display = 'block';
});

checkToken();

// Wire up button
document.getElementById('analyzeBtn').addEventListener('click', runSearch);
document.getElementById('urlInput').addEventListener('keydown', function(e){
  if(e.key === 'Enter') runSearch();
});

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = '⚠️ ' + msg;
  el.classList.add('show');
  document.getElementById('analyzeBtn').disabled = false;
  document.getElementById('loadingBox').classList.remove('show');
}

function setLoading(text) {
  document.getElementById('loadingBox').classList.add('show');
  document.getElementById('loadingText').textContent = text;
  document.getElementById('errorMsg').classList.remove('show');
  document.getElementById('analyzeBtn').disabled = true;
  document.getElementById('resultsBox').innerHTML = '';
}

function fmt(n) {
  if(!n) return '0';
  if(n>=1000000) return (n/1000000).toFixed(1)+'M';
  if(n>=1000) return (n/1000).toFixed(1)+'K';
  return String(n);
}

async function runSearch() {
  const raw = document.getElementById('urlInput').value.trim();
  if(!raw){ showError('أدخل الرابط أولاً'); return; }

  // Build clean URL
  let igUrl, handle;
  if(raw.includes('instagram.com')) {
    igUrl = raw.endsWith('/') ? raw : raw + '/';
    const m = raw.match(/instagram\.com\/([^/?#]+)/);
    handle = m ? m[1] : raw;
  } else {
    handle = raw.replace('@','');
    igUrl = `https://www.instagram.com/${handle}/`;
  }

  setLoading('⚙️ بدء العملية على Apify...');

  try {
    // 1. Start actor run
    const r1 = await fetch(
      `https://api.apify.com/v2/acts/apify~instagram-scraper/runs?token=${TOKEN}`,
      {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
          directUrls: [igUrl],
          resultsType: 'details',
          resultsLimit: 500
        })
      }
    );

    if(!r1.ok) {
      const e = await r1.json().catch(()=>({}));
      throw new Error(e?.error?.message || `خطأ HTTP: ${r1.status}`);
    }

    const j1 = await r1.json();
    const runId = j1?.data?.id;
    const datasetId = j1?.data?.defaultDatasetId;
    if(!runId) throw new Error('لم يبدأ الـ run — تحقق من التوكن');

    // 2. Poll status
    let status = 'RUNNING', tries = 0;
    while(['RUNNING','READY','CREATED'].includes(status)) {
      await new Promise(r => setTimeout(r, 4000));
      tries++;
      if(tries > 60) throw new Error('انتهت المهلة (240 ثانية)، حاول مجدداً');
      document.getElementById('loadingText').textContent = `⏳ جاري المعالجة... ${tries*4}ث`;
      const r2 = await fetch(`https://api.apify.com/v2/actor-runs/${runId}?token=${TOKEN}`);
      const j2 = await r2.json();
      status = j2?.data?.status;
    }

    if(status !== 'SUCCEEDED') throw new Error('فشلت العملية: ' + status);

    // 3. Get data
    document.getElementById('loadingText').textContent = '📦 جاري تحميل البيانات...';
    const r3 = await fetch(`https://api.apify.com/v2/datasets/${datasetId}/items?token=${TOKEN}`);
    const items = await r3.json();

    if(!items || items.length === 0) throw new Error('الحساب غير موجود أو خاص');

    document.getElementById('loadingBox').classList.remove('show');
    document.getElementById('analyzeBtn').disabled = false;
    showResults(items[0], handle);

  } catch(err) {
    showError(err.message || 'خطأ غير متوقع');
  }
}

function proxyImg(url) {
  if(!url) return '';
  return 'https://images.weserv.nl/?url=' + encodeURIComponent(url.replace('https://',''));
}


function estimateReach(post, followers) {
  const likes = post.likesCount >= 0 ? (post.likesCount || 0) : 0;
  const comments = post.commentsCount || 0;
  const views = post.videoViewCount || post.videoPlayCount || 0;
  const isVideo = views > 0;

  // Base reach estimation model (based on industry averages)
  // Average organic reach = 5-15% of followers for photos, 10-25% for videos
  let baseReachRate = isVideo ? 0.18 : 0.10;

  // Engagement boost: high engagement = higher reach (algorithm pushes it)
  const engRate = followers > 0 ? (likes + comments) / followers : 0;
  if (engRate > 0.05) baseReachRate *= 1.8;
  else if (engRate > 0.02) baseReachRate *= 1.4;
  else if (engRate < 0.005) baseReachRate *= 0.7;

  // For videos, use actual views as a better signal
  if (isVideo && views > 0) {
    // Views are usually 1.2-2x reach
    return Math.round(views / 1.5);
  }

  // For photos/carousels
  const estimatedReach = Math.round(followers * baseReachRate);

  // Cross-check with likes (likes are usually 1-3% of reach)
  const reachFromLikes = likes > 0 ? Math.round(likes / 0.02) : 0;

  // Weighted average
  if (reachFromLikes > 0) {
    return Math.round((estimatedReach * 0.4) + (reachFromLikes * 0.6));
  }
  return estimatedReach;
}

function reachLabel(reach) {
  if (reach >= 10000) return { color: 'var(--green)', label: '🔥 انتشار واسع' };
  if (reach >= 3000) return  { color: 'var(--accent)', label: '⚡ انتشار جيد' };
  if (reach >= 1000) return  { color: 'var(--yellow)', label: '📊 انتشار متوسط' };
  return { color: 'var(--red)', label: '📉 انتشار محدود' };
}
function calcTrend(posts) {
  // Split posts into two halves and compare engagement
  if(posts.length < 4) return null;
  const half = Math.floor(posts.length / 2);
  const recent = posts.slice(0, half);
  const older = posts.slice(half);
  const avgRecent = recent.reduce((s,p)=>s+(p.likesCount||0)+(p.commentsCount||0),0)/recent.length;
  const avgOlder = older.reduce((s,p)=>s+(p.likesCount||0)+(p.commentsCount||0),0)/older.length;
  if(avgOlder === 0) return null;
  return ((avgRecent - avgOlder) / avgOlder * 100).toFixed(1);
}

function bestPostingDay(posts) {
  const days = ['الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];
  const eng = Array(7).fill(0), count = Array(7).fill(0);
  posts.forEach(p => {
    if(!p.timestamp) return;
    const d = new Date(p.timestamp).getDay();
    eng[d] += (p.likesCount||0)+(p.commentsCount||0);
    count[d]++;
  });
  let best = 0;
  for(let i=1;i<7;i++) if((count[i]?eng[i]/count[i]:0) > (count[best]?eng[best]/count[best]:0)) best=i;
  return days[best];
}

function postsByMonth(posts) {
  const map = {};
  posts.forEach(p => {
    if(!p.timestamp) return;
    const d = new Date(p.timestamp);
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    if(!map[key]) map[key] = {likes:0,comments:0,count:0};
    map[key].likes += p.likesCount||0;
    map[key].comments += p.commentsCount||0;
    map[key].count++;
  });
  return Object.entries(map).sort((a,b)=>a[0].localeCompare(b[0])).slice(-12);
}

function showResults(d, handle) {
  const followers = d.followersCount || d.followedByCount || 0;
  const following = d.followsCount || d.followingCount || 0;
  const posts = d.latestPosts || d.posts || [];
  const postsCount = d.postsCount || posts.length || 0;
  // Handle hidden likes (-1 means hidden by owner)
  const visiblePosts = posts.filter(p => (p.likesCount||0) >= 0);
  const hiddenLikesPosts = posts.filter(p => p.likesCount === -1);
  const avgL = visiblePosts.length ? Math.round(visiblePosts.reduce((s,p)=>s+(p.likesCount||0),0)/visiblePosts.length) : 0;
  const avgC = posts.length ? Math.round(posts.reduce((s,p)=>s+(p.commentsCount||0),0)/posts.length) : 0;
  const avgShares = posts.filter(p=>p.videoViewCount||p.sharesCount).length ?
    Math.round(posts.reduce((s,p)=>s+(p.sharesCount||0),0)/posts.length) : 0;
  const totalViews = posts.reduce((s,p)=>s+(p.videoViewCount||p.videoPlayCount||0),0);
  const eng = followers > 0 ? ((avgL+avgC)/followers*100).toFixed(2) : '0';
  const totalLikes = posts.reduce((s,p)=>s+(p.likesCount||0),0);
  const totalComments = posts.reduce((s,p)=>s+(p.commentsCount||0),0);
  const trend = calcTrend(posts);
  const bestDay = posts.length > 4 ? bestPostingDay(posts) : null;
  const monthlyData = postsByMonth(posts);
  const maxMonthlyEng = Math.max(...monthlyData.map(([,v])=>v.likes+v.comments), 1);

  // Filter to posts from last year only
  const oneYearAgo = Date.now() - 365*24*60*60*1000;
  const yearPosts = posts.filter(p => p.timestamp ? new Date(p.timestamp).getTime() > oneYearAgo : true);

  // Top 50 by engagement
  const top50 = [...yearPosts]
    .sort((a,b)=>((b.likesCount||0)+(b.commentsCount||0))-((a.likesCount||0)+(a.commentsCount||0)))
    ;  // كل المنشورات مرتبة من الأعلى للأدنى تفاعلاً

  // Sort posts
  const mostLiked = [...yearPosts].sort((a,b)=>(b.likesCount||0)-(a.likesCount||0))[0];
  const mostCommented = [...yearPosts].sort((a,b)=>(b.commentsCount||0)-(a.commentsCount||0))[0];
  const mostEngaged = top50[0];

  const engColor = parseFloat(eng)>5?'var(--green)':parseFloat(eng)>2?'var(--yellow)':'var(--red)';
  const engLabel = parseFloat(eng)>5?'🔥 ممتاز':parseFloat(eng)>2?'⚡ متوسط':'📉 ضعيف';

  function postCard(p, badge) {
    if(!p) return '';
    return `<div class="post highlight-post" onclick="window.open('${p.url||"#"}','_blank')">
      <div class="post-badge">${badge}</div>
      <div class="post-img">${p.displayUrl?`<img src="${proxyImg(p.displayUrl)}" onerror="this.parentElement.innerHTML='🖼️'">`:'🖼️'}</div>
      <div class="post-info">
        <div class="post-caption">${(p.caption||'').slice(0,80)||'بدون تعليق'}</div>
        <div class="post-nums"><span>❤️ ${fmt(p.likesCount||0)}</span><span>💬 ${fmt(p.commentsCount||0)}</span></div>
      </div>
    </div>`;
  }

  document.getElementById('resultsBox').innerHTML = `
    <div class="fadeUp">

      <!-- Profile -->
      <div class="profile-card">
        <div class="profile-top">
          ${d.profilePicUrl ? `<img class="avatar" src="${proxyImg(d.profilePicUrl)}" onerror="this.style.display='none'">` : ''}
          <div style="flex:1">
            <div class="profile-name">${d.verified?'<span style="color:var(--accent)">✓</span> ':''}${d.fullName||handle}</div>
            <div class="profile-handle" style="direction:ltr;text-align:left">@${d.username||handle}</div>
            ${d.biography?`<div class="profile-bio">${d.biography}</div>`:''}
          </div>
        </div>
      </div>

      <!-- Section: الأرقام الأساسية -->
      <div class="section-title">📊 الأرقام الأساسية</div>
      <div class="stats-row">
        <div class="stat">
          <div class="stat-num">${fmt(followers)}</div>
          <div class="stat-lbl">متابع</div>
        </div>
        <div class="stat">
          <div class="stat-num">${fmt(following)}</div>
          <div class="stat-lbl">يتابع</div>
        </div>
        <div class="stat">
          <div class="stat-num">${fmt(postsCount)}</div>
          <div class="stat-lbl">منشور</div>
        </div>
      </div>

      <!-- Section: التفاعل -->
      <div class="section-title">💡 تحليل التفاعل</div>
      <div class="eng-card">
        <div class="eng-main">
          <div class="eng-num" style="color:${engColor}">${eng}%</div>
          <div class="eng-label">${engLabel}</div>
          <div class="eng-sub">معدل التفاعل</div>
        </div>
        <div class="eng-details">
          <div class="eng-item"><span class="eng-icon">❤️</span><div>
            <div class="eng-val">${avgL === 0 && hiddenLikesPosts.length > 0 ? '🔒 مخفية' : fmt(avgL)}</div>
            <div class="eng-key">متوسط الإعجابات ${hiddenLikesPosts.length > 0 ? `(${hiddenLikesPosts.length} منشور مخفي)` : ''}</div>
          </div></div>
          <div class="eng-item"><span class="eng-icon">💬</span><div><div class="eng-val">${fmt(avgC)}</div><div class="eng-key">متوسط التعليقات</div></div></div>
          ${avgShares > 0 ? `<div class="eng-item"><span class="eng-icon">🔁</span><div><div class="eng-val">${fmt(avgShares)}</div><div class="eng-key">متوسط المشاركات (Reels)</div></div></div>` : ''}
          ${totalViews > 0 ? `<div class="eng-item"><span class="eng-icon">👁️</span><div><div class="eng-val">${fmt(totalViews)}</div><div class="eng-key">إجمالي المشاهدات</div></div></div>` : ''}
          <div class="eng-item"><span class="eng-icon">📝</span><div><div class="eng-val">${fmt(posts.length)}</div><div class="eng-key">منشور محلّل</div></div></div>
          <div class="eng-item"><span class="eng-icon">📡</span><div>
            <div class="eng-val">${fmt(Math.round(posts.reduce((s,p)=>s+estimateReach(p,followers),0)/Math.max(posts.length,1)))}</div>
            <div class="eng-key">متوسط الوصول التقديري</div>
          </div></div>
        </div>
      </div>

      <!-- Section: إحصائيات متقدمة -->
      <div class="section-title">📅 تحليل سنة كاملة (${yearPosts.length} منشور خلال السنة)</div>
      <div class="adv-grid">
        <div class="adv-card">
          <div class="adv-icon">📈</div>
          <div class="adv-val" style="color:${trend===null?'var(--muted)':parseFloat(trend)>0?'var(--green)':'var(--red)'}">
            ${trend===null?'—':(parseFloat(trend)>0?'▲ +':'▼ ')+trend+'%'}
          </div>
          <div class="adv-lbl">اتجاه التفاعل</div>
          <div class="adv-sub">${trend===null?'':parseFloat(trend)>0?'تحسّن مقارنة بالسابق':'تراجع مقارنة بالسابق'}</div>
        </div>
        <div class="adv-card">
          <div class="adv-icon">🏅</div>
          <div class="adv-val">${bestDay||'—'}</div>
          <div class="adv-lbl">أفضل يوم نشر</div>
          <div class="adv-sub">الأعلى تفاعلاً</div>
        </div>
        <div class="adv-card">
          <div class="adv-icon">❤️</div>
          <div class="adv-val">${fmt(totalLikes)}</div>
          <div class="adv-lbl">إجمالي الإعجابات</div>
          <div class="adv-sub">خلال الفترة المحللة</div>
        </div>
        <div class="adv-card">
          <div class="adv-icon">💬</div>
          <div class="adv-val">${fmt(totalComments)}</div>
          <div class="adv-lbl">إجمالي التعليقات</div>
          <div class="adv-sub">خلال الفترة المحللة</div>
        </div>
      </div>

      <!-- Monthly chart -->
      ${monthlyData.length > 1 ? `
        <div class="section-title">📊 التفاعل الشهري</div>
        <div class="chart-wrap">
          ${monthlyData.map(([month, v]) => {
            const h = Math.round(((v.likes+v.comments)/maxMonthlyEng)*80);
            const label = month.slice(0,7);
            return `<div class="chart-col">
              <div class="chart-bar-wrap">
                <div class="chart-bar" style="height:${h}px" title="${v.likes+v.comments} تفاعل"></div>
              </div>
              <div class="chart-lbl">${label.slice(5)}</div>
            </div>`;
          }).join('')}
        </div>
      ` : ''}

      <!-- Section: أبرز المنشورات -->
      ${posts.length > 0 ? `
        <div class="section-title">🏆 أبرز المنشورات</div>
        <div class="highlight-grid">
          ${postCard(mostLiked, '❤️ الأكثر إعجاباً')}
          ${postCard(mostCommented, '💬 الأكثر تعليقاً')}
          ${mostEngaged && mostEngaged !== mostLiked ? postCard(mostEngaged, '🔥 الأعلى تفاعلاً') : ''}
        </div>

        <div class="section-title">📸 آخر المنشورات</div>
        <div class="posts-grid">
          ${top50.map((p,i)=>`
            <div class="post" onclick="window.open('${p.url||"#"}','_blank')" style="position:relative">
              <div style="position:absolute;top:5px;right:5px;z-index:2;background:rgba(0,0,0,0.7);color:white;font-size:10px;font-weight:800;padding:2px 7px;border-radius:20px">#${i+1}</div>
              <div class="post-img">${p.displayUrl?`<img src="${proxyImg(p.displayUrl)}" onerror="this.parentElement.innerHTML='🖼️'">`:'🖼️'}</div>
              <div class="post-info">
                <div class="post-caption">${(p.caption||'').slice(0,60)||'بدون تعليق'}</div>
                <div class="post-nums">
                  <span>${p.likesCount === -1 ? '❤️ 🔒' : '❤️ '+fmt(p.likesCount||0)}</span>
                  <span>💬 ${fmt(p.commentsCount||0)}</span>
                  ${p.sharesCount ? `<span>🔁 ${fmt(p.sharesCount)}</span>` : ''}
                  ${p.videoViewCount ? `<span>👁️ ${fmt(p.videoViewCount)}</span>` : ''}
                </div>
                <div class="post-reach">
                  ${(() => {
                    const r = estimateReach(p, followers);
                    const rl = reachLabel(r);
                    return `<span style="color:${rl.color}">📡 ~${fmt(r)} وصول تقديري</span>`;
                  })()}
                </div>
              </div>
            </div>
          `).join('')}
        </div>
      ` : ''}

      <button class="back-btn" onclick="resetSearch()">🔙 بحث جديد</button>
    </div>
  `;
}

function resetSearch() {
  document.getElementById('resultsBox').innerHTML = '';
  document.getElementById('urlInput').value = '';
  document.getElementById('errorMsg').classList.remove('show');
}
</script>
</body>
</html>
